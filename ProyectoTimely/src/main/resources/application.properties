spring.application.name=ProyectoTimely

# ==========================================
# CONFIGURACION DE BASE DE DATOS
# ==========================================

# La URL de conexion - Es lo mismo que tenias en Connexion.java
# jdbc:mysql:// = protocolo (como http:// pero para MySQL)
# localhost:3306 = tu PC en el puerto 3306 (puerto por defecto de MySQL)
# /Timely = el nombre de tu base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/Timely

# Usuario y contrasena de tu base de datos (los mismos que tenias en Connexion.java)
spring.datasource.username=usuario
spring.datasource.password=usuario

# El driver de MySQL - Le dice a Java QUE tipo de BD es
# Es lo mismo que el Class.forName("com.mysql.cj.jdbc.Driver") que tenias antes
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# CONFIGURACION DE JPA (Hibernate)
# ==========================================

# ddl-auto controla QUE HACE Spring con tus tablas al arrancar:
#   - "none"     = NO toca nada (usa las tablas que ya existen) <-- LO QUE QUEREMOS
#   - "update"   = Crea/modifica tablas si faltan (peligroso en produccion)
#   - "create"   = BORRA todo y crea las tablas de nuevo (CUIDADO!)
#   - "validate" = Solo comprueba que las tablas coinciden con tus @Entity
# Usamos "none" porque TU ya tienes las tablas creadas con Timely.sql
spring.jpa.hibernate.ddl-auto=none

# Muestra las consultas SQL que hace Hibernate en la consola
# Muy util para aprender y depurar. En produccion lo pondrias a false
spring.jpa.show-sql=true

# Le dice a Hibernate que dialecto SQL usar (como "hablar" con MySQL)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==========================================
# CONFIGURACION DEL SERVIDOR WEB
# ==========================================

# Puerto donde arranca tu API. React hara peticiones a http://localhost:8080
# Si lo cambias a 9090, React llamaria a http://localhost:9090
server.port=8081
