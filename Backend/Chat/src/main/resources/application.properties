spring.application.name=Chat
spring.datasource.url=jdbc:mysql://localhost:3306/Timely

#Usuario y contraseña
spring.datasource.username=usuario
spring.datasource.password=usuario

# El driver de MySQL - Le dice a Java QUE tipo de BD es
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# CONFIGURACION DE JPA (Hibernate)

# ddl-auto controla QUE HACE Spring con tus tablas al arrancar:
#   - "none"     = NO toca nada (usa las tablas que ya existen)
spring.jpa.hibernate.ddl-auto=none

# Muestra las consultas SQL que hace Hibernate en la consola
# Muy util para aprender y depurar. En produccion lo pondrias a false
spring.jpa.show-sql=true

# Le dice a Hibernate que dialecto SQL usar (como "hablar" con MySQL)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

server.port=8082